name: Update market data

on:
  schedule:
    # Hourly test schedule for development.
    - cron: '17 * * * *'
    # Suggested final submission version (daily). Uncomment the next line after testing.
    # - cron: '5 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Build indicator outputs
        run: python scripts/build_indicator.py

      - name: Validate outputs
        run: python scripts/validate_output.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.csv data/processed/* docs/data/*
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update market data"
            git push
          fi
