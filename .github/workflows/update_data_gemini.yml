name: Update market data Gemini

on:
  schedule:
    - cron: '5 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-market-data-gemini-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install google-genai

      - name: Fetch market data
        run: python scripts/fetch_market_data.py

      - name: Build indicator outputs
        run: python scripts/build_indicator.py

      - name: Validate outputs
        run: python scripts/validate_output.py

      - name: Generate dashboard summary with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENABLE_AI_SUMMARY: "1"
          GEMINI_MODEL: "gemini-2.5-flash-lite"
        run: python scripts/generate_summary_gemini.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/raw/*.csv data/processed/* docs/data/* docs/app.js scripts/generate_summary_gemini.py
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update market data and Gemini summary"
            git push
          fi
